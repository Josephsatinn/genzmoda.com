<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>Projelerim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; height: 100vh; display: flex; }

    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      transition: filter 0.5s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      filter: brightness(0.6);
      background-size: 200% 200%;
    }

    .section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      mix-blend-mode: overlay;
      opacity: 0.4;
    }

    .section:hover { filter: brightness(1); }
    .section img { max-width: 60%; height: auto; margin-bottom: 15px; z-index: 1; }
    .section h2 { margin-bottom: 15px; font-size: 1.8rem; z-index: 1; }
    .section button {
      background: transparent;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.5s ease-in-out;
      z-index: 1;
    }
    .section button:hover { background: rgba(255, 255, 255, 0.8); color: #333; }

    .bot { background: linear-gradient(to right, #007bff, #28a745 70%); }
    .genzmoda { background: linear-gradient(to right, #28a745, #6f42c1 70%); }
    .grave { background: linear-gradient(to right, #6f42c1, #007bff 70%); }
    .section+.section { margin-left: -1px; }

    /* --- LOADING ANIMATION --- */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
        rgba(129, 59, 151, 0.5),
        rgba(70, 60, 150, 0.5)
    );
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
}


    .line {
      position: relative;
      width: 300px;
      height: 3px;
      background: rgba(255, 255, 255, .1);
      overflow: hidden;
    }

    .line::before {
      animation: progress1 4s infinite;
      transform-origin: 0 0;
      content: "";
      display: block;
      width: 300px;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.4) 80%, rgba(255,255,255,1));
    }

    .line::after {
      content: "";
      position: absolute;
      animation: progress2 4s infinite;
      transform-origin: 90% 50%;
      margin-left: -24px;
      top: -9px;
      width: 30px;
      height: 21px;
      border-radius: 2px;
      background: rgba(210,189,255,.55);
      filter: blur(8px);
      box-shadow: 0 0 10px 6px rgba(210,189,255,.4),
                  -20px 0 15px 4px rgba(210,189,255,.3),
                  -40px 0 15px 2px rgba(210,189,255,.2),
                  -60px 0 10px 1px rgba(210,189,255,.1),
                  -80px 0 10px 1px rgba(210,189,255,.05);
    }

    @keyframes progress1 {
      0% { transform: scalex(0); opacity: .5; }
      90% { transform: scalex(1); opacity: 1; }
      92% { transform: scalex(1); opacity: 1; }
      100% { transform: scalex(1); opacity: 0; }
    }

    @keyframes progress2 {
      0% { transform: scale(.3,.8) translatez(0); opacity: 0; }
      90% { transform: scale(1,1) translatex(300px) translatez(0); opacity: 1; }
      100% { transform: scale(1,1) translatex(300px) translatez(0); opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading">
    <div class="line"></div>
  </div>

  <!-- Sections -->
  <div class="section bot" data-href="bot/">
    <img src="bot.png" alt="Bot Projesi">
    <h2>Bot</h2>
    <button>Projeye Git</button>
  </div>

  <div class="section genzmoda" data-href="genzmoda/">
    <img src="genzmoda.png" alt="Genzmoda Projesi">
    <h2>Genzmoda</h2>
    <button>Projeye Git</button>
  </div>

  <div class="section grave" data-href="grave/">
    <img src="grave.png" alt="Grave Projesi">
    <h2>Grave</h2>
    <button>Projeye Git</button>
  </div>

  <script>
    // İlk açılışta yükleme animasyonu
    window.addEventListener("load", () => {
      const loading = document.getElementById("loading");
      setTimeout(() => {
        loading.style.display = "none";
      }, 2000); // 2 saniye sonra gizle
    });

    // Section tıklamalarında animasyon göster
    document.querySelectorAll(".section").forEach(section => {
      section.addEventListener("click", e => {
        e.preventDefault();
        const href = section.getAttribute("data-href");
        const loading = document.getElementById("loading");
        loading.style.display = "flex";

        setTimeout(() => {
          window.location.href = href;
        }, 2000); // animasyon bitince yönlendir
      });
    });
  </script>

</body>
</html>
